<div class="session-content">
	<h2>Identification 2D</h2>

	<app-subject-identifier-input></app-subject-identifier-input>

	<div class="row mx-1">
		<button mat-flat-button color="primary" [disabled]="isLoading" (click)="doIdentification2d()">
			{{ isLoading ? 'Identifying...' : 'Choose image' }}
			<input type="file" #identification2dInput hidden (change)="handleIdentification2dFile($event)" />
		</button>
	</div>

	<app-error-display #errorDisplay></app-error-display>

	<div class="form-row" *ngIf="sessionId as id">
		<div>IdentificationId: <code>{{ id }}</code></div>
	</div>

	<div class="status-result" *ngIf="lastStatus as status">
		<h3>Session Result:</h3>
		<pre>{{ status | json }}</pre>
	</div>
</div>
